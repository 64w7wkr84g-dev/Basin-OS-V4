name: Basin Radar Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * 1-5"

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run Basin Radar
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: "llama-3.3-70b-versatile"
          MAX_PUBLIC_SEARCHES: "500"
          MAX_GROQ_CALLS: "140"
          MAX_NPI: "45"
          MAX_RSS: "160"
          MAX_LINKEDIN_DISCOVERY: "200"
          MAX_CPA_DISCOVERY: "100"
        run: node basin-radar-runner.js

      - name: Validate JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('public/data/radar-leads.json','utf8')); console.log('public/data/radar-leads.json valid')"
          node -e "JSON.parse(require('fs').readFileSync('radar-leads.json','utf8')); console.log('radar-leads.json valid')"

      - name: Commit radar data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Basin Radar leads
          file_pattern: "public/data/*.json radar-leads.json radar-research-candidates.json radar-rejected.json"
