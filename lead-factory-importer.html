<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Basin OS — Lead Factory Importer V7.1</title>
<style>
body{margin:0;background:#070b10;color:#f5f7fb;font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:24px}
.card{max-width:980px;margin:auto;background:#111a27;border:1px solid #2b3748;border-radius:18px;padding:22px;box-shadow:0 20px 70px rgba(0,0,0,.35)}
button{background:#d89424;color:#070b10;border:0;border-radius:12px;padding:14px 18px;font-weight:900;font-size:16px;margin:6px 6px 6px 0}
pre{white-space:pre-wrap;background:#070b10;border:1px solid #2b3748;border-radius:12px;padding:14px;color:#b7c4d8;max-height:440px;overflow:auto}
.good{border:1px solid #286f4a;background:#0d2519;color:#c6ffdc;border-radius:12px;padding:12px;margin:14px 0}.warn{border:1px solid #7a3540;background:#2a1218;color:#ffd0d0;border-radius:12px;padding:12px;margin:14px 0}.info{border:1px solid #315d7c;background:#0e2233;color:#cdeaff;border-radius:12px;padding:12px;margin:14px 0}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:12px 0}.stat{border:1px solid #2b3748;border-radius:14px;padding:12px;background:#0b111a}.num{font-size:28px;font-weight:900;color:#d89424}.lbl{font-size:11px;color:#aeb8ca;text-transform:uppercase;letter-spacing:.08em}
</style>
</head>
<body>
<div class="card">
<h1>Basin OS Lead Factory Importer V7.1</h1>
<div class="warn"><b>Safe LinkedIn workflow:</b> candidate URL only, manual open, manual confirm/reject, optional pasted snapshot parser. No page reading or scraping.</div>
<div class="info"><b>Use:</b> this page force-loads the latest GitHub radar JSON into this browser’s localStorage.</div>
<button onclick="loadFactory()">Load V7.1 Lead Factory Data</button>
<button onclick="clearFactory()">Clear Lead Factory Browser Data</button>
<div id="summary"></div>
<div id="out"></div>
</div>
<script>
const STORE_KEY='basin_os_integrated';
const now=()=>new Date().toISOString();
async function loadJson(path,fallback){try{const r=await fetch(path+'?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(r.status+' '+r.statusText);return await r.json()}catch(e){return Object.assign({_missing:true,_error:String(e.message||e)},fallback)}}
function getStore(){let s={};try{s=JSON.parse(localStorage.getItem(STORE_KEY)||'{}')}catch(e){};s.leadFactory=s.leadFactory||{leads:[],research:[],activity:[]};return s}
function save(s){localStorage.setItem(STORE_KEY,JSON.stringify(s))}
async function loadFactory(){
  const active=await loadJson('radar-leads.json',{leads:[],researchCandidates:[],stats:{}});
  const research=await loadJson('radar-research-candidates.json',{candidates:null,stats:{}});
  const leads=Array.isArray(active.leads)?active.leads:[];
  const candidates=Array.isArray(research.candidates)?research.candidates:(Array.isArray(active.researchCandidates)?active.researchCandidates:[]);
  const s=getStore();
  s.leadFactory={leads,research:candidates,activity:[{id:'import_'+Date.now(),text:'Imported V7.1 Lead Factory data',createdAt:now()}],lastImportedAt:now()};
  s.radarLeads=leads;
  s.leadWorkflow=leads.concat(candidates);
  save(s);
  const stats=active.stats||{};
  document.getElementById('summary').innerHTML='<div class="grid"><div class="stat"><div class="num">'+leads.length+'</div><div class="lbl">Ready</div></div><div class="stat"><div class="num">'+(stats.emailFirst||0)+'</div><div class="lbl">Email</div></div><div class="stat"><div class="num">'+(stats.linkedinFirst||0)+'</div><div class="lbl">LinkedIn</div></div><div class="stat"><div class="num">'+(stats.linkedinVerify||0)+'</div><div class="lbl">LI Verify</div></div><div class="stat"><div class="num">'+(stats.readyPhone||0)+'</div><div class="lbl">Call</div></div><div class="stat"><div class="num">'+candidates.length+'</div><div class="lbl">Research</div></div></div>';
  document.getElementById('out').innerHTML='<div class="good"><b>Loaded.</b> Return to Basin OS and click Lead Factory.</div><pre>'+JSON.stringify({activeStats:active.stats,researchStats:research.stats},null,2)+'</pre>';
}
function clearFactory(){let s=getStore();s.leadFactory={leads:[],research:[],activity:[]};s.radarLeads=[];s.leadWorkflow=[];save(s);document.getElementById('out').innerHTML='<div class="good">Cleared.</div>'}
</script>
</body>
</html>
